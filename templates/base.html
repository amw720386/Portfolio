<!DOCTYPE html>
<html lang="en" data-theme="default">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Ahamed Mohamed Wajibu · Portfolio{% endblock %}</title>
  <meta name="description" content="Developer portfolio: projects and contact. Built by Ahamed." />
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='logo.svg') }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500..800&family=DM+Sans:ital,opsz,wght@0,9..40,400..700;1,9..40,400..600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/tiles.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/effects.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/bg-type.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/compartment.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/modals.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/readme-content.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}" />
  {% block head %}{% endblock %}
</head>
<body>
  <a class="skip-link" href="#bento-root">Skip to content</a>
  {% block body %}{% endblock %}
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
