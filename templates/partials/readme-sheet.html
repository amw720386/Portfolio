<div class="readme-sheet" id="readme-sheet" hidden aria-hidden="true">
  <div class="readme-sheet__backdrop" id="readme-sheet-backdrop"></div>
  <div class="readme-sheet__dialog" role="dialog" aria-modal="true" aria-labelledby="readme-sheet-title">
    <header class="readme-sheet__head">
      <h2 class="readme-sheet__title" id="readme-sheet-title"></h2>
      <button type="button" class="readme-sheet__close" id="readme-sheet-close" aria-label="Close README">×</button>
    </header>
    <div class="readme-sheet__content readme-content" id="readme-sheet-content"></div>
  </div>
</div>
